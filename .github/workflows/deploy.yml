name: Build and Deploy to cPanel

on:
  push:
    branches:
      - main  # This triggers the deploy every time you push to 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗️ Install and Build
        run: |
          npm ci
          npm run build

      - name: 🚀 Sync to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/  # Vite outputs to dist
          server-dir: ./public_html/
          # This ensures we don't delete files already on the server 
          # unless they are part of the new build
          delete-destination-extra-files: false 
