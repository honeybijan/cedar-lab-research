name: Build and Deploy to cPanel

on:
  push:
    branches:
      - main  # This triggers the deploy every time you push to 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 🏗️ Install and Build
        run: |
          npm ci
          npm run build

      - name: 🚀 Sync to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: public_html/
          dangerous-clean-slate: true
          timeout: 60000
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/board_intro_assets/**
            **/Sanya_assets/**
            **/ResearchOverview_assets/**
            **/OCIS_assets/**
            **/SPO_assets/**
            **/.DS_Store
