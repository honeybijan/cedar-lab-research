name: Build and Deploy to cPanel

on:
  push:
    branches:
      - main  # This triggers the deploy every time you push to 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 🏗️ Install and Build
        run: |
          npm ci
          npm run build

      - name: 🚀 Sync to cPanel via FTP
        run: |
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-allow yes;
            set ftp:ssl-force yes;
            set ftp:ssl-protect-data yes;
            set mirror:parallel-transfer-count 5;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ftps://${{ secrets.FTP_SERVER }}:21;
            mirror --reverse --delete --verbose \
              --exclude-glob .git* \
              --exclude-glob node_modules/ \
              --exclude-glob .DS_Store \
              --exclude-glob board_intro_assets/ \
              --exclude-glob Sanya_assets/ \
              --exclude-glob ResearchOverview_assets/ \
              --exclude-glob OCIS_assets/ \
              --exclude-glob SPO_assets/ \
              ./dist/ /public_html/;
            quit;
          "
